<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Radar circles -->
  <circle cx="16" cy="16" r="14" stroke="#111827" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.2"/>
  <circle cx="16" cy="16" r="9" stroke="#111827" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.35"/>
  <!-- Bike wheels -->
  <circle cx="10" cy="20" r="5" stroke="#111827" stroke-width="2"/>
  <circle cx="22" cy="20" r="5" stroke="#111827" stroke-width="2"/>
  <!-- Bike frame -->
  <polyline points="10,20 16,12 22,20" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="16" y1="12" x2="22" y2="12" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="12" x2="22" y2="20" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
  <!-- Handlebars -->
  <line x1="22" y1="12" x2="24" y2="10" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="14" y1="11" x2="18" y2="11" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
</svg>
